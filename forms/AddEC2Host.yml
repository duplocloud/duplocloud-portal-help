nativeHostMenuAsgCapacity: Specify the desired number of instances to run in the Auto Scaling Group.
nativeHostMenuAsgMinSize: Specify the minimum number of instances the Auto Scaling Group must maintain.
nativeHostMenuAsgMaxSize: Specify the maximum number of instances the Auto Scaling Group is allowed to scale to.
nativeHostMenuPricingType: |
  Select the pricing model for instances.

  1. **On-Demand** — Standard pricing with no upfront commitment.
  2. **Spot** — Use spare EC2 capacity at reduced cost. Instances may be interrupted. [Details](https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/using-spot-instances.html)
nativeHostMenuAsgSpotPrice: Specify the maximum Spot price you are willing to pay per hour in USD. Example- `0.045` = 4.5 cents/hour. Leave blank to use the current Spot price.
nativeHostMenuName: Specify a friendly name to identify this Auto Scaling Group.
nativeHostMenuAllocationTags: Specify allocation tags to constrain which nodes this ASG's instances are scheduled on. DuploCloud will ensure instances run on hosts with matching tags.
UseMultipleInstanceTypes: |
  Enable to launch instances across multiple EC2 instance types.
  Improves availability and reduces the chance of insufficient capacity errors. [Details](https://docs.aws.amazon.com/autoscaling/ec2/userguide/ec2-auto-scaling-mixed-instances-groups.html)
nativeHostMenuClass: Select the EC2 instance type for the Auto Scaling Group. Choose **Other** to enter a custom instance type.
nativeHostMenuClass_other: Enter a custom EC2 instance type if not listed above. Example- `m5.xlarge`.
nativeHostMenuImageId: Select the AMI (Amazon Machine Image) to use for launching instances. Choose **Other** to enter a custom AMI ID.
nativeHostMenuImageId_other: Enter a custom AMI ID if not listed above. Example- `ami-0abcdef1234567890`.
nativeHostMenuEbs: Select whether the instance uses EBS-backed or instance store (Non-EBS) storage.
nativeHostMenuIsMinion: Select the pool type for the instances in this Auto Scaling Group.
nativeHostMenuZone: Select the Availability Zone where instances will be launched. Choosing a specific zone overrides the default multi-zone distribution.
nativeHostMenuDiskSize: Specify the root disk size in GB. Leave blank to use the default size from the AMI.
nativeHostMenuHibernation: Enable to allow instances to hibernate. Hibernation preserves in-memory state to disk. Requires an EBS root volume with sufficient space. [Details](https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/hibernating-prerequisites.html)
nativeHostMenuUserData: |
  Enter Base64-encoded user data script to run on instance launch.
  ```yaml
  #!/bin/bash
  echo "Hello World" > /tmp/hello.txt
  ```
  Encode your script using `base64` before pasting. [Details](https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/user-data.html)
nativeHostMenuTags: |
  Enter tags as JSON key-value pairs to apply to instances in this ASG.
  ```json
  {"Env": "production", "Team": "platform"}
  ```
nativeHostMenuVols: |
  Specify additional EBS block devices to attach to each instance, in JSON array format.
  ```json
  [{"Name": "/dev/sdA", "VolumeType": "Gp2", "Size": "100"}]
  ```
nativeHostNetworkInterfaces: |
  Specify custom network interface configuration in JSON format.
  ```json
  {"DeviceIndex": 0, "SubnetId": "subnet-abc123", "Groups": ["sg-xyz456"]}
  ```
