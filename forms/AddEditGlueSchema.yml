SchemaName: Specify a unique name for the schema within the registry. Allowed characters- letters, numbers, hyphens, underscores, `$`, `#`, `.` (max 255 characters). Cannot be changed after creation.
DataFormat: |
  Select the serialization format for schema definitions.

  1. **AVRO** — Apache Avro format. Widely used for streaming data with Kafka.
  2. **JSON** — JSON Schema format.
  3. **PROTOBUF** — Protocol Buffers format. Efficient binary serialization.
  Cannot be changed after creation.
Compatibility: |
  Controls which schema versions are compatible with this schema. Determines whether new versions can be registered.

  1. **NONE** — No compatibility check. Any version can be registered.
  2. **DISABLED** — Prevents new versions from being registered.
  3. **BACKWARD** — New version can read data written by the previous version.
  4. **BACKWARD_ALL** — New version can read data written by all previous versions.
  5. **FORWARD** — Previous version can read data written by the new version.
  6. **FORWARD_ALL** — All previous versions can read data written by the new version.
  7. **FULL** — Both BACKWARD and FORWARD compatibility with the previous version.
  8. **FULL_ALL** — Both BACKWARD_ALL and FORWARD_ALL compatibility.
  See [AWS Glue Schema Registry compatibility](https://docs.aws.amazon.com/glue/latest/dg/schema-registry.html#schema-registry-compatibility) for details.
Description: Optional description for the schema (max 2048 characters).
SchemaDefinition: |
  Enter the schema definition for the first version. The format must match the selected Data Format.
  ```json
  { "type": "record", "name": "MyRecord", "fields": [{ "name": "id", "type": "int" }] }
  ```
  When editing, this field is read-only. Register a new version from the schema detail page to update the definition.
