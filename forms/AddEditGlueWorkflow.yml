WorkflowName: Specify a unique name for the workflow (max 255 characters). Cannot be changed after creation.
MaxConcurrentRuns: Optional maximum number of concurrent workflow runs. Leave blank for unlimited. Set to 1 to prevent overlapping runs.
Description: Optional description for the workflow (max 2048 characters).
PropKey: Enter the name of the default run property key. These key-value pairs are available to all jobs and crawlers in the workflow run via `$job.run.properties`.
PropVal: Enter the value for the corresponding run property key.
