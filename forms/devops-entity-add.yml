Name: |
  Enter a unique name for the Load Balancer.
  Must start with a letter and can include letters, numbers, and hyphens (-).
  Minimum 2 characters. Maximum 15 characters.
  Example: web-lb1

LbType: |
  Select the Load Balancer type (Network or Application).
  The type determines how traffic is handled and routed.
  Choose the appropriate type based on your application architecture and traffic requirements.

Size: |
  Select the Load Balancer visibility.
  Choose Public to expose the Load Balancer to the internet.
  Choose Internal to restrict access within the private network (VPC/VNet).