# Basic Fields
TriggerName: Specify a unique name for the trigger (max 255 characters). Cannot be changed after creation.
TriggerType: |
  Select how the trigger is activated.

  1. **SCHEDULED** — Fires on a recurring cron schedule.
  2. **CONDITIONAL** — Fires when specified job or crawler runs reach a defined state.
  3. **ON_DEMAND** — Fires manually when invoked.
  4. **EVENT** — Fires in response to EventBridge events.
Description: Optional description for the trigger (max 2048 characters).

# Schedule (SCHEDULED type)
Schedule: Specify the schedule using AWS Glue 6-field cron syntax. Format- `cron(minutes hours day-of-month month day-of-week year)`. Use `?` for either day-of-month or day-of-week (not both). Example- `cron(*/2 * * * ? *)` runs every 2 minutes. For help, click [here](https://docs.aws.amazon.com/glue/latest/dg/monitor-data-warehouse-schedule.html).

# Conditions (CONDITIONAL type)
PredicateLogic: |
  Select how multiple conditions are evaluated.

  1. **AND** — All conditions must be satisfied before the trigger fires.
  2. **ANY** — The trigger fires when any one condition is satisfied.
CondType: Select whether the condition watches a Glue Job run or a Crawler run.
CondName: Select the specific job or crawler to watch.
CondState: |
  Select the run state that satisfies this condition.

  **For Jobs:** SUCCEEDED, STOPPED, FAILED, TIMEOUT, ERROR
  **For Crawlers:** SUCCEEDED, CANCELLED, FAILED, ERROR

# Actions
ActionType: Select whether this action triggers a Glue Job or a Crawler.
ActionName: Select the job or crawler to activate when the trigger fires.
